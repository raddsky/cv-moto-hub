services:
  - type: web
    name: cv-moto-hub
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cv-moto-hub-db
          property: connectionString

databases:
  - name: cv-moto-hub-db
    databaseName: cv_moto_hub
    user: cv_moto_hub_user
